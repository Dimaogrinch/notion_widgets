<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greetings</title>

<style>
body {
    font-variant-caps: all-petite-caps;
    margin: 0;
    background: transparent;
}

.container {
    width: 100%;
    display: flex;
    justify-content: center;
}

.widget {
    padding: 10px;
    color: #ffffff;              /* текст белый */
    background: #000000;         /* чёрный фон */
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    max-width: 95%;
    margin: auto;

    border: 2px solid #ffffff;   /* белая рамка */
    border-radius: 6px;

    box-shadow: none;
}

.greet {
    font-size: 3em;
    color: #ffffff;
}

.date {
    font-family: monospace;
    font-size: 2em;
    color: #ffffff;
}

.clock {
    font-family: monospace;
    font-size: 2em;
    color: #ffffff;
}

.time {
    display: inline-block;
    min-width: 20px;
}

.colon {
    font-size: 1em;
    display: inline-block;
}
</style>
</head>

<body>

<div class="container">
    <div class="widget">

        <div class="greet" id="greet"></div>

        <div class="date" id="date"></div>

        <div class="clock">
            <div class="time" id="hour"></div>
            <div class="colon">:</div>
            <div class="time" id="min"></div>
            <div class="colon">:</div>
            <div class="time" id="sec"></div>
        </div>

    </div>
</div>

<script>
function displayGreetings(today){
    let hrs = today.getHours();
    let name = "DIMAOGRINCH";

    let greet = "";

    if (hrs < 12)
        greet = "Good Morning " + name;
    else if (hrs < 18)
        greet = "Good Afternoon " + name;
    else
        greet = "Good Evening " + name;

    document.getElementById("greet").innerHTML = greet;
}

function displayDate(today) {
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ["January","February","March","April","May","June",
        "July","August","September","October","November","December"];

    let dayName = days[today.getDay()];
    let monthName = months[today.getMonth()];
    let date = today.getDate();
    let year = today.getFullYear();

    document.getElementById("date").innerHTML =
        dayName + ", " + monthName + " " + date + " " + year;
}

function padZeros(num){
    return num < 10 ? "0" + num : num;
}

function twelveHour(hour){
    if (hour === 0) return 12;
    if (hour > 12) return hour - 12;
    return hour;
}

function displayClock(today){
    let hour = padZeros(twelveHour(today.getHours()));
    let minutes = padZeros(today.getMinutes());
    let seconds = padZeros(today.getSeconds());

    let ampm = today.getHours() >= 12 ? " pm" : " am";

    document.getElementById("hour").innerHTML = hour;
    document.getElementById("min").innerHTML = minutes;
    document.getElementById("sec").innerHTML = seconds + ampm;
}

function displayWidget(){
    let today = new Date();
    displayGreetings(today);
    displayDate(today);
    displayClock(today);

    setTimeout(displayWidget, 500);
}

displayWidget();
</script>

</body>
</html>

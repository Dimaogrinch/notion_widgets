<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Widget</title>

<style>

/* Notion Dark */
body{
    margin: 0;
    background: #191919;
    font-variant-caps: all-petite-caps;
    font-family: Arial, sans-serif;

    display: flex;
    justify-content: center;
    align-items: center;

    min-height: 100vh;
}

/* Widget */
.widget {
    width: 95%;
    max-width: 900px;

    padding: 8px 12px;

    background: #202020;
    border: 1px solid #2f2f2f;
    border-radius: 8px;

    color: #ffffff;

    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* Greeting - как в старом HTML */
.greet{
    font-size: 3em;
    color: #e6e6e6;
    text-align: center;
}

/* Date - как в старом HTML */
.date {
    font-family: monospace;
    font-size: 2em;
    color: #b8b8b8;
}

/* Clock - как в старом HTML */
.clock {
    font-family: monospace;
    font-size: 2em;
    color: #d0d0d0;

    display: flex;
    align-items: center;
}

/* Time */
.time {
    display: inline-block;
    min-width: 20px;
    text-align: center;
}

/* : */
.colon {
    font-size: 1em;
    display: inline-block;
    opacity: 0.7;
    margin: 0 4px;
}

</style>
</head>

<body>

<div class="widget">

    <div class="greet" id="greet"></div>

    <div class="date" id="date"></div>

    <div class="clock">
        <div class="time" id="hour"></div>
        <div class="colon">:</div>
        <div class="time" id="min"></div>
        <div class="colon">:</div>
        <div class="time" id="sec"></div>
    </div>

</div>

<script>

function dispalyGreetings(today){
    let hrs = today.getHours();
    let name = "DIMAOGRINCH";

    let greet;

    if (hrs < 12)
        greet = 'Good Morning ' + name;
    else if (hrs >= 12 && hrs <= 17)
        greet = 'Good Afternoon ' + name;
    else
        greet = 'Good Evening ' + name;

    document.getElementById('greet').innerHTML = greet;
}

function dispalyDate(today){

    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

    const monthNames = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
    ];

    let dayName = days[today.getDay()];
    let monthName = monthNames[today.getMonth()];
    let date = today.getDate();
    let year = today.getFullYear();

    document.getElementById('date').innerHTML =
        dayName + ", " + monthName + " " + date + " " + year;
}

function dispalyClock(today) {

    let hour = padZeros(twelveHour(today.getHours()));
    let minutes = padZeros(today.getMinutes());
    let seconds = padZeros(today.getSeconds());

    if(today.getHours() >= 12){
        seconds += " pm";
    } else {
        seconds += " am";
    }

    document.getElementById('hour').innerHTML = hour;
    document.getElementById('min').innerHTML = minutes;
    document.getElementById('sec').innerHTML = seconds;
}

function twelveHour(hour) {
    if (hour > 12) {
        return hour - 12;
    } else if (hour === 0) {
        return 12;
    } else {
        return hour;
    }
}

function padZeros(num) {
    if (num < 10) {
        num = '0' + num;
    }
    return num;
}

function dispalyWidget() {
    let today = new Date();

    dispalyGreetings(today);
    dispalyDate(today);
    dispalyClock(today);

    setTimeout(dispalyWidget, 500);
}

dispalyWidget();

</script>

</body>
</html>

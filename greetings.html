<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget Transparent</title>

<style>

body{
    margin: 0;
    background: #191919;
    font-variant-caps: all-petite-caps;
    font-family: Arial, sans-serif;

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* OUTER BOX (оставили как есть) */
.widget {
    width: 95%;
    max-width: 900px;

    padding: 8px 12px;

    background: transparent;   /* 🔥 ВОТ ГЛАВНОЕ */
    border: 1px solid #2f2f2f;
    border-radius: 8px;

    color: #ffffff;

    display: flex;
    flex-direction: column;
    align-items: center;
}

/* TEXT */
.greet{
    font-size: 3em;
    color: #e6e6e6;
}

.date {
    font-family: monospace;
    font-size: 2em;
    color: #b8b8b8;
}

.clock {
    font-family: monospace;
    font-size: 2em;
    color: #d0d0d0;
}

.time {
    display: inline-block;
    min-width: 20px;
}

.colon {
    opacity: 0.7;
    margin: 0 4px;
}

</style>
</head>

<body>

<div class="widget">

    <div class="greet" id="greet"></div>

    <div class="date" id="date"></div>

    <div class="clock">
        <span class="time" id="hour"></span>
        <span class="colon">:</span>
        <span class="time" id="min"></span>
        <span class="colon">:</span>
        <span class="time" id="sec"></span>
    </div>

</div>

<script>

function dispalyGreetings(today){
    let hrs = today.getHours();
    let name = "DIMAOGRINCH";

    let greet;

    if (hrs < 12)
        greet = 'Good Morning ' + name;
    else if (hrs < 18)
        greet = 'Good Afternoon ' + name;
    else
        greet = 'Good Evening ' + name;

    document.getElementById('greet').innerHTML = greet;
}

function dispalyDate(today){

    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    const months = ["January","February","March","April","May","June",
        "July","August","September","October","November","December"];

    document.getElementById('date').innerHTML =
        days[today.getDay()] + ", " +
        months[today.getMonth()] + " " +
        today.getDate() + " " +
        today.getFullYear();
}

function dispalyClock(today){

    const pad = n => n < 10 ? "0"+n : n;

    document.getElementById('hour').innerHTML = pad(today.getHours());
    document.getElementById('min').innerHTML = pad(today.getMinutes());
    document.getElementById('sec').innerHTML = pad(today.getSeconds());
}

function dispalyWidget(){
    let today = new Date();

    dispalyGreetings(today);
    dispalyDate(today);
    dispalyClock(today);

    setTimeout(dispalyWidget, 500);
}

dispalyWidget();

</script>

</body>
</html>

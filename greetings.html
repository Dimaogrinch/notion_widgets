<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greetings</title>

<style>

body{
    font-variant-caps: all-petite-caps;
    background: #191919;   /* Notion dark */
}

/* MAIN BOX */
.widget {
    padding: 8px 10px;
    color: #d1d1d1;

    display: flex;
    justify-content:center;
    align-items:center;
    flex-direction: column;

    max-width: 95%;
    margin: auto;

    background: #202020;   /* Notion card */
    border: 1px solid #2f2f2f; /* мягкая рамка */
    border-radius: 8px;

    box-shadow: none;
}

/* TEXT STYLE (Notion-like) */
.greet{
    font-size: 2.2em;
    font-weight: 400;
    color: #e6e6e6;
}

.date {
    font-family: monospace;
    font-size: 1.2em;
    color: #a8a8a8;
}

.clock {
    font-family: monospace;
    font-size: 1.2em;
    color: #bdbdbd;
}

.time {
    display: inline-block;
    min-width: 20px;
}

.colon {
    opacity: 0.5;
}

</style>
</head>

<body>

<div class="container">
    <div class="widget">

        <div class="greet" id="greet"></div>

        <div class="date" id="date"></div>

        <div class="clock">
            <div class="time" id="hour"></div>
            <div class="colon">:</div>
            <div class="time" id="min"></div>
            <div class="colon">:</div>
            <div class="time" id="sec"></div>
        </div>

    </div>
</div>

<script>

function dispalyGreetings(today){
    let hrs = today.getHours();
    let name = "DIMAOGRINCH";

    let greet;

    if (hrs < 12)
        greet = 'Good Morning ' + name;
    else if (hrs < 18)
        greet = 'Good Afternoon ' + name;
    else
        greet = 'Good Evening ' + name;

    document.getElementById('greet').innerHTML = greet;
}

function dispalyDate(today){

    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ["January","February","March","April","May","June",
        "July","August","September","October","November","December"];

    document.getElementById('date').innerHTML =
        days[today.getDay()] + ", " +
        months[today.getMonth()] + " " +
        today.getDate() + " " +
        today.getFullYear();
}

function dispalyClock(today){

    function pad(n){ return n < 10 ? "0"+n : n; }

    document.getElementById('hour').innerHTML = pad(today.getHours());
    document.getElementById('min').innerHTML = pad(today.getMinutes());
    document.getElementById('sec').innerHTML = pad(today.getSeconds());
}

function dispalyWidget(){
    let today = new Date();

    dispalyGreetings(today);
    dispalyDate(today);
    dispalyClock(today);

    setTimeout(dispalyWidget, 500);
}

dispalyWidget();

</script>

</body>
</html>

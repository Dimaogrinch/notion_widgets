<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Widget</title>

<style>
body {
    margin: 0;
    background: #0b0b0b;
    font-variant-caps: all-petite-caps;
    font-family: Arial, sans-serif;
}

/* центрирование */
.container {
    width: 100%;
    display: flex;
    justify-content: center;
    padding-top: 40px;
}

/* ГЛАВНЫЙ БЛОК (как на скрине) */
.widget {
    width: 92%;
    max-width: 900px;

    background: #0f0f0f;              /* чуть светлее фона */
    border: 1px solid #3a3a3a;        /* тонкая серая рамка */
    border-radius: 10px;

    padding: 22px 18px;

    display: flex;
    flex-direction: column;
    align-items: center;

    box-shadow: 0 0 0 1px rgba(255,255,255,0.03);
}

/* ГЛАВНЫЙ ТЕКСТ */
.greet {
    font-size: 28px;
    letter-spacing: 2px;
    color: #cfd3d7;   /* НЕ белый — мягкий серый */
    margin-bottom: 8px;
}

/* дата */
.date {
    font-size: 14px;
    letter-spacing: 1px;
    color: #9aa0a6;
    margin-bottom: 6px;
}

/* часы */
.clock {
    font-family: monospace;
    font-size: 18px;
    color: #b9bec4;
}

/* цифры */
.time {
    display: inline-block;
    min-width: 22px;
}

/* разделитель */
.colon {
    opacity: 0.6;
}

/* лёгкий hover эффект (как в UI системах) */
.widget:hover {
    border-color: #555;
}
</style>
</head>

<body>

<div class="container">
    <div class="widget">

        <div class="greet" id="greet"></div>

        <div class="date" id="date"></div>

        <div class="clock">
            <span class="time" id="hour"></span>
            <span class="colon">:</span>
            <span class="time" id="min"></span>
            <span class="colon">:</span>
            <span class="time" id="sec"></span>
        </div>

    </div>
</div>

<script>
function displayGreetings(today){
    let hrs = today.getHours();
    let name = "DIMAOGRINCH";

    if (hrs < 12)
        document.getElementById("greet").innerHTML = "GOOD MORNING " + name;
    else if (hrs < 18)
        document.getElementById("greet").innerHTML = "GOOD AFTERNOON " + name;
    else
        document.getElementById("greet").innerHTML = "GOOD EVENING " + name;
}

function displayDate(today){
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ["January","February","March","April","May","June",
        "July","August","September","October","November","December"];

    document.getElementById("date").innerHTML =
        days[today.getDay()] + ", " +
        months[today.getMonth()] + " " +
        today.getDate() + " " +
        today.getFullYear();
}

function pad(n){
    return n < 10 ? "0" + n : n;
}

function displayClock(today){
    document.getElementById("hour").innerHTML = pad(today.getHours());
    document.getElementById("min").innerHTML = pad(today.getMinutes());
    document.getElementById("sec").innerHTML = pad(today.getSeconds());
}

function update(){
    let now = new Date();
    displayGreetings(now);
    displayDate(now);
    displayClock(now);
}

setInterval(update, 500);
update();
</script>

</body>
</html>

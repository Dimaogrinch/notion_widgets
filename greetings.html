<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Widget</title>

<style>

/* BACKGROUND (Notion dark style) */
body{
    margin: 0;
    background: #191919;
    font-variant-caps: all-petite-caps;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* MAIN BOX */
.widget {
    width: 95%;
    max-width: 900px;

    padding: 10px 14px;

    background: #202020;
    border: 1px solid #2f2f2f;
    border-radius: 8px;

    display: flex;
    flex-direction: column;
    align-items: center;
}

/* GREETING */
.greet{
    font-size: 28px;
    font-weight: 400;
    color: #e6e6e6;
    letter-spacing: 1px;
    margin-bottom: 6px;
}

/* DATE */
.date {
    font-family: monospace;
    font-size: 14px;
    color: #a8a8a8;
    margin-bottom: 4px;
}

/* CLOCK */
.clock {
    font-family: monospace;
    font-size: 14px;
    color: #bdbdbd;
}

/* NUMBERS */
.time {
    display: inline-block;
    min-width: 18px;
}

/* COLON */
.colon {
    opacity: 0.5;
}

</style>
</head>

<body>

<div class="widget">

    <div class="greet" id="greet"></div>

    <div class="date" id="date"></div>

    <div class="clock">
        <span class="time" id="hour"></span>
        <span class="colon">:</span>
        <span class="time" id="min"></span>
        <span class="colon">:</span>
        <span class="time" id="sec"></span>
    </div>

</div>

<script>

function dispalyGreetings(today){
    let hrs = today.getHours();
    let name = "DIMAOGRINCH";

    let greet;

    if (hrs < 12)
        greet = "Good Morning " + name;
    else if (hrs < 18)
        greet = "Good Afternoon " + name;
    else
        greet = "Good Evening " + name;

    document.getElementById('greet').innerHTML = greet;
}

function dispalyDate(today){

    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ["January","February","March","April","May","June",
        "July","August","September","October","November","December"];

    document.getElementById('date').innerHTML =
        days[today.getDay()] + ", " +
        months[today.getMonth()] + " " +
        today.getDate() + " " +
        today.getFullYear();
}

function dispalyClock(today){

    const pad = n => n < 10 ? "0"+n : n;

    document.getElementById('hour').innerHTML = pad(today.getHours());
    document.getElementById('min').innerHTML = pad(today.getMinutes());
    document.getElementById('sec').innerHTML = pad(today.getSeconds());
}

function dispalyWidget(){
    let today = new Date();

    dispalyGreetings(today);
    dispalyDate(today);
    dispalyClock(today);

    setTimeout(dispalyWidget, 500);
}

dispalyWidget();

</script>

</body>
</html>

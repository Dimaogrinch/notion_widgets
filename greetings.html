<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Widget Soft</title>

<style>
body {
    margin: 0;
    background: #0a0a0a;
    font-family: Arial, sans-serif;
}

/* container */
.container {
    display: flex;
    justify-content: center;
    padding-top: 50px;
}

/* main card */
.widget {
    width: 92%;
    max-width: 900px;

    padding: 28px 20px;
    border-radius: 14px;

    background: rgba(20, 20, 20, 0.65);
    border: 1px solid rgba(255,255,255,0.10);

    backdrop-filter: blur(10px);

    display: flex;
    flex-direction: column;
    align-items: center;
}

/* 🔥 МЯГКИЙ ТЕКСТ (ключевое изменение) */
.greet {
    font-size: 26px;
    font-weight: 300;          /* было жирнее → теперь мягко */
    letter-spacing: 2px;
    color: rgba(220, 220, 220, 0.85);
    margin-bottom: 8px;
}

/* дата */
.date {
    font-size: 13px;
    font-weight: 300;          /* мягкий вес */
    letter-spacing: 1px;
    color: rgba(170, 170, 170, 0.75);
    margin-bottom: 10px;
}

/* часы */
.clock {
    font-family: monospace;
    font-size: 18px;
    font-weight: 300;          /* важно — убирает “тяжесть” */
    color: rgba(200, 200, 200, 0.85);
}

/* цифры */
.time {
    min-width: 22px;
    display: inline-block;
    font-weight: 300;
}

/* разделитель */
.colon {
    opacity: 0.4;
}

/* тонкая линия */
.widget::before {
    content: "";
    width: 100%;
    height: 1px;
    background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.12),
        transparent
    );
    position: relative;
    top: -10px;
}
</style>
</head>

<body>

<div class="container">
    <div class="widget">

        <div class="greet" id="greet"></div>
        <div class="date" id="date"></div>

        <div class="clock">
            <span class="time" id="hour"></span>
            <span class="colon">:</span>
            <span class="time" id="min"></span>
            <span class="colon">:</span>
            <span class="time" id="sec"></span>
        </div>

    </div>
</div>

<script>
function updateTime(){
    let now = new Date();
    let name = "DIMAOGRINCH";

    let h = now.getHours();

    if (h < 12)
        document.getElementById("greet").innerHTML = "GOOD MORNING " + name;
    else if (h < 18)
        document.getElementById("greet").innerHTML = "GOOD AFTERNOON " + name;
    else
        document.getElementById("greet").innerHTML = "GOOD EVENING " + name;

    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ["January","February","March","April","May","June",
        "July","August","September","October","November","December"];

    document.getElementById("date").innerHTML =
        days[now.getDay()] + ", " +
        months[now.getMonth()] + " " +
        now.getDate() + " " +
        now.getFullYear();

    const pad = n => n < 10 ? "0"+n : n;

    document.getElementById("hour").innerHTML = pad(now.getHours());
    document.getElementById("min").innerHTML = pad(now.getMinutes());
    document.getElementById("sec").innerHTML = pad(now.getSeconds());
}

setInterval(updateTime, 500);
updateTime();
</script>

</body>
</html>
